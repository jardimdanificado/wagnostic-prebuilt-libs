name: Build V8 (multi-platform)

on:
  workflow_dispatch:
  push:
    paths:
      - '.v8-version'
      - '.github/workflows/build-v8.yml'

env:
  V8_REF: main  # troque para a tag/branch específica que você quer fixar

jobs:
  build-v8:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_os: linux
            target_cpu: x64
          - os: ubuntu-latest
            target_os: linux
            target_cpu: x86
          - os: ubuntu-latest
            target_os: linux
            target_cpu: arm
          - os: ubuntu-latest
            target_os: linux
            target_cpu: arm64
          - os: windows-latest
            target_os: win
            target_cpu: x64
          - os: windows-latest
            target_os: win
            target_cpu: x86
          - os: macos-13
            target_os: mac
            target_cpu: x64
          - os: macos-latest
            target_os: mac
            target_cpu: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Cache depot_tools + V8 checkout
        uses: actions/cache@v4
        id: v8-src-cache
        with:
          path: |
            depot_tools
            v8
          key: v8-src-${{ env.V8_REF }}

      - name: Fetch V8 source
        if: steps.v8-src-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="$PWD/depot_tools:$PATH"
          fetch v8
          cd v8
          git checkout "${{ env.V8_REF }}"
          gclient sync

      - name: Cache build output
        uses: actions/cache@v4
        id: v8-build-cache
        with:
          path: v8/out/${{ matrix.target_os }}-${{ matrix.target_cpu }}
          key: v8-build-${{ env.V8_REF }}-${{ matrix.target_os }}-${{ matrix.target_cpu }}

      - name: Install Linux cross sysroot
        if: matrix.target_os == 'linux' && steps.v8-build-cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=${{ matrix.target_cpu }}

      - name: Generate build files
        if: steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          gn gen out/${{ matrix.target_os }}-${{ matrix.target_cpu }} --args='
            target_os="${{ matrix.target_os }}"
            target_cpu="${{ matrix.target_cpu }}"
            is_debug=false
            v8_monolithic=true
            v8_static_library=true
            is_component_build=false
            v8_use_external_startup_data=false
            v8_enable_i18n_support=false
            v8_enable_inspector=false
            v8_enable_disassembler=false
            v8_enable_gdbjit=false
            v8_enable_webassembly=true
            use_custom_libcxx=false
          '

      - name: Build v8_monolith
        if: steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          ninja -C out/${{ matrix.target_os }}-${{ matrix.target_cpu }} v8_monolith

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist/include
          cp -r v8/include/* dist/include/
          if [ "${{ matrix.target_os }}" = "win" ]; then
            cp v8/out/${{ matrix.target_os }}-${{ matrix.target_cpu }}/obj/v8_monolith.lib dist/ || true
          else
            cp v8/out/${{ matrix.target_os }}-${{ matrix.target_cpu }}/obj/libv8_monolith.a dist/ || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-${{ matrix.target_os }}-${{ matrix.target_cpu }}
          path: dist/
          retention-days: 30
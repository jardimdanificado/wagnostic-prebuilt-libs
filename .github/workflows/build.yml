name: Build V8 (multi-platform)

on:
  workflow_dispatch:
  push:
    paths:
      - '.v8-version'
      - '.github/workflows/build-v8.yml'

env:
  V8_REF: 15.1.154
  DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
  BUILD_CACHE_VERSION: "2"  

jobs:
  build-v8:
    strategy:
      fail-fast: false
      matrix:
        flavor: [full, stripped, debug]
        combo:
          - { os: ubuntu-latest,     target_os: linux, target_cpu: x64 }
          - { os: ubuntu-latest,     target_os: linux, target_cpu: x86 }
          - { os: ubuntu-latest,     target_os: linux, target_cpu: arm }
          - { os: ubuntu-latest,     target_os: linux, target_cpu: arm64 }
          - { os: windows-latest,    target_os: win,   target_cpu: x64 }
          - { os: windows-latest,    target_os: win,   target_cpu: x86 }
          - { os: macos-15-intel,    target_os: mac,   target_cpu: x64 }
          - { os: macos-latest,      target_os: mac,   target_cpu: arm64 }

    runs-on: ${{ matrix.combo.os }}

    steps:
      # ---------------------------------------------------------------
      # Setup comum
      # ---------------------------------------------------------------
      - name: Disable Git autocrlf (evita corromper o .digests do depot_tools no Windows)
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.longpaths true

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Set working directory
        id: workdir
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mkdir -p /d/v8work
            echo "dir=D:\v8work" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${{ github.workspace }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache depot_tools + V8 checkout
        uses: actions/cache@v4
        id: v8-src-cache
        with:
          path: |
            ${{ steps.workdir.outputs.dir }}/depot_tools
            ${{ steps.workdir.outputs.dir }}/v8
          key: v8-src-${{ runner.os }}-${{ env.V8_REF }}

      - name: Cache build output
        uses: actions/cache@v4
        id: v8-build-cache
        with:
          path: ${{ steps.workdir.outputs.dir }}/v8/out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}
          key: v8-build-${{ runner.os }}-${{ env.V8_REF }}-${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}-v${{ env.BUILD_CACHE_VERSION }}

      # ---------------------------------------------------------------
      # Linux / macOS (bash)
      # ---------------------------------------------------------------
      - name: "[unix] Fetch V8 source"
        if: runner.os != 'Windows' && steps.v8-src-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          git clone -c core.autocrlf=false https://chromium.googlesource.com/chromium/tools/depot_tools.git
          export PATH="$PWD/depot_tools:$PATH"
          fetch v8
          cd v8
          git checkout "${{ env.V8_REF }}"
          gclient sync

      - name: "[unix] Install Linux cross sysroot"
        if: matrix.combo.target_os == 'linux' && steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=${{ matrix.combo.target_cpu }}

      - name: "[unix] Generate build files"
        if: runner.os != 'Windows' && steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          export PATH="$PWD/depot_tools:$PATH"
          cd v8

          BASE_ARGS='
            target_os="${{ matrix.combo.target_os }}"
            target_cpu="${{ matrix.combo.target_cpu }}"
            v8_monolithic=true
            v8_static_library=true
            is_component_build=false
            v8_use_external_startup_data=false
            v8_enable_webassembly=true
            v8_enable_sandbox=false
            use_thin_archives=false
          '

          case "${{ matrix.flavor }}" in
            full)
              FLAVOR_ARGS='
                is_debug=false
                v8_enable_i18n_support=true
                v8_enable_inspector=true
                v8_enable_disassembler=true
                v8_enable_gdbjit=true
              '
              ;;
            stripped)
              FLAVOR_ARGS='
                is_debug=false
                v8_enable_i18n_support=false
                v8_enable_inspector=false
                v8_enable_disassembler=false
                v8_enable_gdbjit=false
                symbol_level=0
              '
              ;;
            debug)
              FLAVOR_ARGS='
                is_debug=true
                v8_enable_i18n_support=true
                v8_enable_inspector=true
                v8_enable_disassembler=true
                v8_enable_gdbjit=true
                symbol_level=2
              '
              ;;
          esac

          gn gen "out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}" \
            --args="$BASE_ARGS $FLAVOR_ARGS"

      - name: "[unix] Build v8_monolith"
        if: runner.os != 'Windows' && steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          export PATH="$PWD/depot_tools:$PATH"
          cd v8
          ninja -C "out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}" v8_monolith

      - name: "[unix] Package artifact"
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd "${{ steps.workdir.outputs.dir }}"
          OUT_DIR="v8/out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}"
          mkdir -p dist/include
          cp -r v8/include/* dist/include/
          cp "$OUT_DIR/obj/libv8_monolith.a" dist/ || true
          if [ "${{ matrix.flavor }}" != "debug" ]; then
            strip -S dist/libv8_monolith.a 2>/dev/null || strip --strip-debug dist/libv8_monolith.a 2>/dev/null || true
          fi

      # ---------------------------------------------------------------
      # Windows (PowerShell — depot_tools não é suportado via Git Bash)
      # ---------------------------------------------------------------
      - name: "[win] Fetch V8 source"
        if: runner.os == 'Windows' && steps.v8-src-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Set-Location "${{ steps.workdir.outputs.dir }}"
          git clone -c core.autocrlf=false https://chromium.googlesource.com/chromium/tools/depot_tools.git
          $env:PATH = "$PWD\depot_tools;$env:PATH"
          fetch v8
          Set-Location v8
          git checkout "${{ env.V8_REF }}"
          gclient sync

      - name: "[win] Generate build files"
        if: runner.os == 'Windows' && steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Set-Location "${{ steps.workdir.outputs.dir }}"
          $env:PATH = "$PWD\depot_tools;$env:PATH"
          Set-Location v8

          $BaseArgs = 'target_os="${{ matrix.combo.target_os }}" target_cpu="${{ matrix.combo.target_cpu }}" v8_monolithic=true v8_static_library=true is_component_build=false v8_use_external_startup_data=false v8_enable_webassembly=true v8_enable_sandbox=false use_thin_archives=false'

          switch ("${{ matrix.flavor }}") {
            "full" {
              $FlavorArgs = 'is_debug=false v8_enable_i18n_support=true v8_enable_inspector=true v8_enable_disassembler=true v8_enable_gdbjit=true'
            }
            "stripped" {
              $FlavorArgs = 'is_debug=false v8_enable_i18n_support=false v8_enable_inspector=false v8_enable_disassembler=false v8_enable_gdbjit=false symbol_level=0'
            }
            "debug" {
              $FlavorArgs = 'is_debug=true v8_enable_i18n_support=true v8_enable_inspector=true v8_enable_disassembler=true v8_enable_gdbjit=true symbol_level=2'
            }
          }

          gn gen "out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}" --args="$BaseArgs $FlavorArgs"

      - name: "[win] Build v8_monolith"
        if: runner.os == 'Windows' && steps.v8-build-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Set-Location "${{ steps.workdir.outputs.dir }}"
          $env:PATH = "$PWD\depot_tools;$env:PATH"
          Set-Location v8
          ninja -C "out/${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}" v8_monolith

      - name: "[win] Package artifact"
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-Location "${{ steps.workdir.outputs.dir }}"
          $OutDir = "v8\out\${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}"
          New-Item -ItemType Directory -Force -Path dist\include | Out-Null
          Copy-Item -Recurse -Force v8\include\* dist\include\
          Copy-Item -Force "$OutDir\obj\v8_monolith.lib" dist\ -ErrorAction SilentlyContinue

      # ---------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8-${{ matrix.combo.target_os }}-${{ matrix.combo.target_cpu }}-${{ matrix.flavor }}
          path: ${{ steps.workdir.outputs.dir }}/dist/
          retention-days: 30